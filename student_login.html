<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <title>Student Login</title>
</head>
<body>
    <div class="container">

        <img src="assets/images/dlsulogowname.png" alt="Logo" class="logo">
        <div class="card">
            <h1>Student Sign In</h1>
            <div class="log">
                <div class="logcard">
                    <label for="username">Username / Email</label>
                    <div class="inpt">
                        <div class="symbl">
                            <img src="assets/images/userlogo.png" alt="userlogo">
                        </div>
                        <input type="text" placeholder="Username" name="username">
                    </div>

                    <label for="password">Password / OTP</label>
                    <div class="inpt">
                        <div class="symbl">
                            <img src="assets/images/passlogo.png" alt="passlogo">
                        </div>
                        <input type="password" placeholder="Password" name="password">
                    </div>
                </div>

                <div class="errormess">
                    <p>Invalid username or password. Please try again.</p>
                </div>

                <a href="student.html">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
