<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/studentlogin.js" type="text/javascript"></script>
    <title>Student Login</title>
</head>
<body>
    <div class="container">

        <img src="assets/images/dlsulogowname.png" alt="Logo" class="logo">
        <div class="card">
            <h1>Student Sign In</h1>
            <div class="log">
                <form class="logcard" action="student.html" onsubmit="return checkForm()">
                    <label for="username">Username / Email</label>
                    <div class="inpt">
                        <div class="symbl">
                            <img src="assets/images/userlogo.png" alt="userlogo">
                        </div>
                        <input type="text" placeholder="Username / Email" name="username" id="studentusername">
                    </div>

                    <label for="password">Password</label>
                    <div class="inpt">
                        <div class="symbl">
                            <img src="assets/images/passlogo.png" alt="passlogo">
                        </div>
                        <input type="password" placeholder="Password" name="password" id="studentpassword">
                    </div>

                <div class="rememberme">
                    <input type="checkbox" id="rememberme" name="rememberme">
                    <label for="rememberme"> Remember Me</label>
                </div>
                
                <div class="errormess" id="errormess">
                    <p>Invalid username or password. Please try again.</p>
                </div>

                <input type="submit" class= "submitbtn" value="Sign In">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
