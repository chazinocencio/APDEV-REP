<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/interface.css">
    <link rel="stylesheet" href="css/studentprofile.css">
    <link rel="stylesheet" href="css/studentreserve.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Student Reserve</title>
</head>
<body>
    <div class="cointainer">
        <div class="header">
            <img src="assets/images/headerlogo.png" alt="Logo">
            <div class="backbutt" id="back">
                <h3>Back</h3>
            </div>
        </div>

        <div class="studentreserve">
            <h1>SELECT ROOM</h1>

            <div class="roomgrid" id="G301">
                <div class="roomcard">
                    <div class="roomheader">
                        <img src="assets/images/roompic.png" alt="Room Thumbnail">
                        <div class="roomlabel">
                            <h3>Room G301</h3>
                        </div>
                    </div>
                    <div class="vacancyinfo">
                        <span>Vacancy:</span>
                        <span>90%</span>
                    </div>
                    <div class="progressbar">
                        <div class="progressfill" style="width: 90%;"></div>
                    </div>
                </div>

                <div class="roomcard" id="G302">
                    <div class="roomheader">
                        <img src="assets/images/roompic.png" alt="Room Thumbnail">
                        <div class="roomlabel">
                            <h3>Room G302</h3>
                        </div>
                    </div>
                    <div class="vacancyinfo">
                        <span>Vacancy:</span>
                        <span>50%</span>
                    </div>
                    <div class="progressbar">
                        <div class="progressfill" style="width: 50%;"></div>
                    </div>
                </div>

                <div class="roomcard" id="G303">
                    <div class="roomheader">
                        <img src="assets/images/roompic.png" alt="Room Thumbnail">
                        <div class="roomlabel">
                            <h3>Room G303</h3>
                        </div>
                        
                    </div>
                    <div class="vacancyinfo">
                        <span>Vacancy:</span>
                        <span>43%</span>
                    </div>
                    <div class="progressbar">
                        <div class="progressfill" style="width: 43%;"></div>
                    </div>
                </div>

                <div class="roomcard" id="G304">
                    <div class="roomheader">
                        <img src="assets/images/roompic.png" alt="Room Thumbnail">
                        <div class="roomlabel">
                            <h3>Room G304</h3>
                        </div>
                    </div>
                    <div class="vacancyinfo">
                        <span>Vacancy:</span>
                        <span>67%</span>
                    </div>
                    <div class="progressbar">
                        <div class="progressfill" style="width: 67%;"></div>
                    </div>
                </div>

                <div class="roomcard" id="G305">
                    <div class="roomheader">
                        <img src="assets/images/roompic.png" alt="Room Thumbnail">
                        <div class="roomlabel">
                            <h3>Room G305</h3>
                        </div>
                    </div>
                    <div class="vacancyinfo">
                        <span>Vacancy:</span>
                        <span>10%</span>
                    </div>
                    <div class="progressbar">
                        <div class="progressfill" style="width: 10%;"></div>
                    </div>
                </div>

                <div class="roomcard" id="G306">
                    <div class="roomheader">
                        <img src="assets/images/roompic.png" alt="Room Thumbnail">
                        <div class="roomlabel">
                            <h3>Room G306</h3>
                        </div>
                        
                    </div>
                    <div class="vacancyinfo">
                        <span>Vacancy:</span>
                        <span>0%</span>
                    </div>
                    <div class="progressbar">
                        <div class="progressfill" style="width: 0%;"></div>
                    </div>
                </div>
                
            </div>

        </div>
    </div>
    <script src="js/studentreserve.js"></script>
</body>
</html>
