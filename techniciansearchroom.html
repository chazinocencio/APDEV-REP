<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/interface.css">
    <link rel="stylesheet" href="css/techniciansearchtime.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Technician Search Time</title>
</head>
<body>
    <div class="cointainer">
        <div class="header">
            <img src="assets/images/headerlogo.png" alt="Logo">
            <div class="backbutt" id="back">
                <h3>Back</h3>
            </div>
        </div>

        <div class="techniciansearchtime">
                <div class="leftdetails">
                    
                    <div class="inpt">
                        <div class="searchdeets">
                            <h3>Date</h3>

                            <div class="options">
                                <div class="search">
                                        <input type="text" placeholder="Search date" name="searchbar" id="date">
                                    <div class="searchlogo">
                                        <img src="assets/images/searchlogo.png" alt="searchlogo">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="searchdeets">
                            <h3>Time Start</h3>

                            <div class="options">
                                <div class="search">
                                        <input type="text" placeholder="Search start time" name="searchbar" id="timestart">
                                    <div class="searchlogo">
                                        <img src="assets/images/searchlogo.png" alt="searchlogo">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="searchdeets">
                            <h3>Time End</h3>

                            <div class="options">
                                <div class="search">
                                        <input type="text" placeholder="Search end time" name="searchbar" id="timeend">
                                    <div class="searchlogo">
                                        <img src="assets/images/searchlogo.png" alt="searchlogo">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                    

                    <div class="butt" id="searchbutt">
                        <h3>Search</h3>
                    </div>
                </div>

                <div class="rightdetails" id="card">
                    <div class="label">
                        <div class="resultdeets">
                                <h3>Room</h3>
                                <h3>Seat</h3>
                        </div>
                    </div>
                    
                    <div class="results">
                        <div class="resultdeets">
                            <p>Room</p>
                            <p>Seat</p>
                        </div>
                            <div class="butt" id="reserve">
                                <h3>Reserve for student</h3>
                            </div>
                            <div class="butt" id="block">
                                <h3>Block</h3>
                            </div>
                    </div>


                </div>
        </div>
    </div>

    <script src="js/techniciansearchtime.js"></script>
</body>
</html>
