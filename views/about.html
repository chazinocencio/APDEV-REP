<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="images/png" href="assets/images/archlabslogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>About</title>
</head>
<body class="about-body">
    <div class="about-shell">
        <img src="assets/images/dlsulogowname.png" alt="Logo" class="logo">

        <main class="about-card">
            <h2 class="about-card-title">About</h2>
            <div class="about-card-rule" aria-hidden="true"></div>

            <div class="about-columns">
                <div class="about-col">
                    <section>
                        <h3>Front End</h3>
                        <ul>
                            <li>HTML</li>
                            <li>CSS</li>
                            <li>JavaScript</li>
                        </ul>
                    </section>
                    <section>
                        <h3>Back End</h3>
                        <ul>
                            <li>Node.js</li>
                        </ul>
                    </section>
                    <section>
                        <h3>Database</h3>
                        <ul>
                            <li>MongoDB Atlas</li>
                        </ul>
                    </section>
                </div>
                <div class="about-col">
                    <section>
                        <h3>NPM Packages</h3>
                        <ul>
                            <li>Bcrypt</li>
                            <li>Cookie-Parser</li>
                            <li>CORS</li>
                            <li>Dotenv</li>
                            <li>Express</li>
                            <li>JSONWebToken (JWT)</li>
                            <li>Mongoose</li>
                            <li>Multer</li>
                        </ul>
                    </section>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
