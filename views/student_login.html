<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" type="images/png" href="assets/images/archlabslogo.png">
    <script src="js/login.js" type="text/javascript"></script>
    <title>Student Login</title>
</head>
<body>
    <div class="container">

        <img src="assets/images/dlsulogowname.png" alt="Logo" class="logo">
        <div class="card">
            <h1>Student Sign In</h1>
            <div class="log">
                <form class="logcard" action="student.html">
                    <label for="email">Email</label>
                    <div class="inpt">
                        <div class="symbl">
                            <img src="assets/images/userlogo.png" alt="userlogo">
                        </div>
                        <input type="text" placeholder="Email" name="email" id="email">
                    </div>

                    <label for="password">Password</label>
                    <div class="inpt">
                        <div class="symbl">
                            <img src="assets/images/passlogo.png" alt="passlogo">
                        </div>
                        <input type="password" placeholder="Password" name="password" id="password">
                    </div>

                <div class="rememberme">
                    <input type="checkbox" id="rememberme" name="rememberme">
                    <label for="rememberme"> Remember Me</label>
                </div>
                
                <div class="errormess" id="errormess">
                    <p>Invalid email or password. Please try again.</p>
                </div>

                <input type="submit" class= "submitbtn" value="Sign In">
                <div class="register-link">
                    <span>Don't have an account?</span>
                    <a href="student_register.html">Register</a>
                </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
