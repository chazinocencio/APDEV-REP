<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/interface.css">
    <link rel="stylesheet" href="css/userreservations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="images/png" href="assets/images/archlabslogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Student Reservations</title>
</head>
<body>
    <div class="cointainer">
        <div class="header">
            <img src="assets/images/headerlogo.png" alt="Logo" id="headerlogo">
            <div class="backbutt" id="back">
                <h3>Back</h3>
            </div>
        </div>

        <div class="userreservations">
                <div class="leftdetails">
                    <h1>User Reservations</h1>
                </div>

                <div class="rightdetails" id="card">
                    <div class="label">
                        <div class="leb">
                            <div class="lab">
                                <h3>Reservation #</h3>
                                <h3>Room #</h3>
                                <span> <h3>Seat #</h3></span>
                            </div>
                            <h3>Request Date</h3>
                            <h3>Request Time</h3>
                            <h3>Date</h3>
                            <div class="st"><h3>Start Time</h3></div>
                            <h3>End Time</h3>
                        </div>
                    </div>

                    <div id="reservations-list">
                        <!-- reservations will be rendered here by js/userreservations.js -->
                    </div>
                </div>

                <div class="editrev hidden" id="editrev">
                        <h1>Edit Reservations</h1>
                        <h3 id="number_reservation">#67676767</h3>

                        <div class="inpt">

                            <div class="searchdeets">
                                <h3>Room</h3>

                                <div class="options">
                                    <select id="room" class="search">
                                        <option value="">Select Room</option>
                                        <option value="G301">G301</option>
                                        <option value="G302">G302</option>
                                        <option value="G303">G303</option>
                                        <option value="G304">G304</option>
                                        <option value="G305">G305</option>
                                        <option value="G306">G306</option>
                                    </select>
                                </div>
                            </div>

                            <div class="searchdeets">
                                <h3>Seat</h3>

                                <div class="options">
                                    <select id="seat" class="search">
                                        
                                    </select>
                                </div>
                            </div>
                            <div class="searchdeets">
                                <h3>Date</h3>

                                <div class="options">
                                    <input id="date" type="date" class="search">
                                </div>
                            </div>


                            <div class="searchdeets">
                                <h3>Time Start</h3>

                                <div class="options">
                                    <select id="timestart" class="search">
                                        <option value="">Select</option>
                                        <option value="08:00">8:00 AM</option>
                                        <option value="08:30">8:30 AM</option>
                                        <option value="09:00">9:00 AM</option>
                                        <option value="09:30">9:30 AM</option>
                                        <option value="10:00">10:00 AM</option>
                                        <option value="10:30">10:30 AM</option>
                                        <option value="11:00">11:00 AM</option>
                                        <option value="11:30">11:30 AM</option>
                                        <option value="12:00">12:00 PM</option>
                                        <option value="12:30">12:30 PM</option>
                                        <option value="13:00">1:00 PM</option>
                                        <option value="13:30">1:30 PM</option>
                                        <option value="14:00">2:00 PM</option>
                                        <option value="14:30">2:30 PM</option>
                                        <option value="15:00">3:00 PM</option>
                                        <option value="15:30">3:30 PM</option>
                                        <option value="16:00">4:00 PM</option>
                                        <option value="16:30">4:30 PM</option>
                                        <option value="17:00">5:00 PM</option>
                                    </select>
                                </div>
                            </div>
                            <div class="searchdeets">
                                <h3>Time End</h3>

                                <div class="options">
                                    <select id="timeend" class="search">
                                        <option value="">Select</option>
                                        <option value="08:00">8:00 AM</option>
                                        <option value="08:30">8:30 AM</option>
                                        <option value="09:00">9:00 AM</option>
                                        <option value="09:30">9:30 AM</option>
                                        <option value="10:00">10:00 AM</option>
                                        <option value="10:30">10:30 AM</option>
                                        <option value="11:00">11:00 AM</option>
                                        <option value="11:30">11:30 AM</option>
                                        <option value="12:00">12:00 PM</option>
                                        <option value="12:30">12:30 PM</option>
                                        <option value="13:00">1:00 PM</option>
                                        <option value="13:30">1:30 PM</option>
                                        <option value="14:00">2:00 PM</option>
                                        <option value="14:30">2:30 PM</option>
                                        <option value="15:00">3:00 PM</option>
                                        <option value="15:30">3:30 PM</option>
                                        <option value="16:00">4:00 PM</option>
                                        <option value="16:30">4:30 PM</option>
                                        <option value="17:00">5:00 PM</option>
                                    </select>
                                </div>
                            </div>
                
                        </div>

                        <p class="errormess hidden">This time slot not available</p>

                        <div class="confirm">
                            <div class="butts">
                                <div class="butt" id="save">
                                    <h3>Save</h3>
                                </div>
                                <div class="canbutt" id="editcancel">
                                    <h3>Cancel</h3>
                                </div>
                            </div>
                        </div>
                    </div>

        </div>
    </div>

    <script src="js/userreservations.js"></script>
</body>
</html>
